# PipeWire Echo Cancellation using NVIDIA Maxine AFX SDK
#
# Prerequisites:
#   1. Maxine AFX SDK installed in /opt/maxine-afx/
#   2. libspa-aec-maxine.so installed in /usr/lib/spa-0.2/aec/
#   3. RTX GPU with Tensor Cores (RTX 20xx+)
#
# Select "Maxine Clean Mic" as input device in Discord/Steam/etc.

context.modules = [
    {
        name = libpipewire-module-echo-cancel
        args = {
            # Use Maxine AEC plugin
            library.name = "aec/libspa-aec-maxine"

            # Virtual source (select this in apps)
            source.props = {
                node.name        = "maxine_clean_mic"
                node.description = "Maxine Clean Mic"
            }

            # Virtual sink for echo reference
            sink.props = {
                node.name        = "maxine_echo_sink"
                node.description = "Maxine Echo Sink"
            }

            # Capture from real mic
            capture.props = {
                node.name     = "maxine_capture"
                node.passive  = true
            }

            # Playback reference (what the speakers play)
            playback.props = {
                node.name     = "maxine_playback"
            }

            # Monitor mode: read speaker output directly (important for laptops!)
            monitor.mode = true

            # Maxine-specific settings (passed to plugin)
            aec.args = {
                # Path to Maxine AFX features/ directory
                maxine.model-path = "/opt/maxine-afx/features"

                # Path to libnv_audiofx.so (leave empty for LD_LIBRARY_PATH)
                # maxine.sdk-path = "/opt/maxine-afx/nvafx/lib"

                # Effect intensity 0.0-1.0 (1.0 = maximum filtering)
                maxine.intensity = "1.0"

                # Also run denoiser after AEC (removes typing, fans etc.)
                maxine.denoise = "true"
            }
        }
    }
]
