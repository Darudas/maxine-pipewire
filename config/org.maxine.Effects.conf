<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow the current user session to own and talk to org.maxine.Effects -->
  <policy context="default">
    <allow own="org.maxine.Effects"/>
    <allow send_destination="org.maxine.Effects"/>
    <allow receive_sender="org.maxine.Effects"/>
  </policy>
</busconfig>
